services:
  postgres:
    image: postgres:15
    container_name: tool_agent_pg
    environment:
      POSTGRES_DB: tool_agent
      POSTGRES_USER: tool_user
      POSTGRES_PASSWORD: tool_pass
    ports:
      - "5432:5432"
    volumes:
      - ./data/internal_database_seed.sql:/docker-entrypoint-initdb.d/01-seed.sql:ro
      - pgdata:/var/lib/postgresql/data
  ollama:
    image: ollama/ollama:latest
    container_name: tool_agent_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  pgdata:
  ollama_data:
